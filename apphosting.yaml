# Firebase App Hosting backend config.
#
# Reference: https://firebase.google.com/docs/app-hosting/configure
# - `runConfig` controls the Cloud Run service (memory, concurrency).
# - `env` exposes plain env vars + references to Secret Manager.
# - Secrets must exist in Secret Manager BEFORE deploy. If a secret
#   listed here doesn't exist, the build fails. Add new providers
#   (Google, OpenAI, OpenRouter, Algolia, Langfuse, PostHog) by
#   appending entries here AFTER `firebase apphosting:secrets:set`
#   has created them.

runConfig:
  cpu: 1
  memoryMiB: 1024
  maxInstances: 5
  minInstances: 0
  concurrency: 80
  timeoutSeconds: 300

env:
  # --- Public client config (NEXT_PUBLIC_*) — inlined into the browser bundle at build time ---
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://rundnd--rundnd-fd1dc.us-central1.hosted.app"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyDEbAOwj-bUMZqFaLg5RlEBgDpMfZCqwTk"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "rundnd-fd1dc.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "rundnd-fd1dc"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "rundnd-fd1dc.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "716578410151"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:716578410151:web:5ffabf95ed3ef2ea4e1582"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-MEGZJEZT7M"
    availability:
      - BUILD
      - RUNTIME

  # --- Server-side Firebase Admin ---
  # No service account key needed: App Hosting runs with Application
  # Default Credentials backed by the attached service identity.
  - variable: FIREBASE_PROJECT_ID
    value: "rundnd-fd1dc"
    availability:
      - RUNTIME
  - variable: FIREBASE_STORAGE_BUCKET
    value: "rundnd-fd1dc.firebasestorage.app"
    availability:
      - RUNTIME

  # --- LLM provider (only Anthropic is required for the game to play) ---
  # If/when you add Google/OpenAI/OpenRouter, append entries below after
  # creating their secrets in Secret Manager.
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - RUNTIME

  # --- Algolia (full-text search for recall_scene) ---
  # NEXT_PUBLIC_* values end up in the client bundle by design (Algolia
  # AppID + Search-Only Key are public), so they're declared as plain
  # values — using `secret:` for them would imply a privacy guarantee
  # that the bundle inlining doesn't actually keep.
  - variable: ALGOLIA_APP_ID
    secret: ALGOLIA_APP_ID
    availability:
      - RUNTIME
  - variable: ALGOLIA_ADMIN_KEY
    secret: ALGOLIA_ADMIN_KEY
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_ALGOLIA_APP_ID
    value: "VZNGRG95KH"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ALGOLIA_SEARCH_KEY
    value: "f2f98e8ae9118ef2030d4900b5586df5"
    availability:
      - BUILD
      - RUNTIME
